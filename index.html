<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grade Calculator Lab</title>
  <!-- Correct CSS file name -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Grade Calculator</h1>

<p>Enter marks for three subjects (out of 100):</p>

<label>Subject 1: <input type="number" id="sub1"></label><br><br>
<label>Subject 2: <input type="number" id="sub2"></label><br><br>
<label>Subject 3: <input type="number" id="sub3"></label><br><br>

<button id="calculate">Calculate Grade</button>

<h2>Results:</h2>
<p id="average">Average: </p>
<p id="grade">Grade: </p>

<!-- Make sure script.js is in the root folder -->
<script src="script.js"></script>

</body>
</html>
