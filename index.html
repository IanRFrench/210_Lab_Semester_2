<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quotes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-color: #f5f5f5;
    }

    #quotes-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .quote-card {
      background-color: lightblue; /* colored background */
      padding: 15px;               /* padding */
      margin: 10px;                /* spacing */
      border-radius: 10px;         /* rounded corners */
      width: fit-content;          /* required */
      text-align: center;
    }

    .author {
      font-style: italic;          /* italic author */
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <h1>Quotes</h1>

  <!-- Container -->
  <div id="quotes-container"></div>

  <!-- Link JS -->
  <script src="quotes.js"></script>

</body>
</html>
