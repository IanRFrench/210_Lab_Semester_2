<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quotes</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .quote-card {
      background-color: #cce5ff; /* colored background */
      padding: 15px;            /* spacing inside */
      margin: 15px auto;        /* spacing outside + center */
      border-radius: 10px;      /* rounded corners */
      width: fit-content;       /* required */
    }

    .author {
      font-style: italic;       /* italic author */
    }
  </style>
</head>
<body>

  <h1>Quotes</h1>

  <div id="quotes-container"></div>

  <!-- Link JS at bottom -->
  <script src="quotes.js"></script>
</body>
</html>
